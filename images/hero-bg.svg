  <path d="M 0 140 L 180 140 L 220 180 L 380 180" fill="none" stroke="#04aa6d" stroke-width="1.2" opacity="0.22"/>
  <path d="M 0 300 L 100 300 L 140 260 L 360 260" fill="none" stroke="#04aa6d" stroke-width="1" opacity="0.18"/>
  <path d="M 0 420 L 200 420 L 240 380 L 420 380" fill="none" stroke="#3A78C9" stroke-width="1" opacity="0.2"/>
  <path d="M 40 520 L 280 520 L 320 480 L 500 480" fill="none" stroke="#04aa6d" stroke-width="0.8" opacity="0.15"/>
  <path d="M 0 80  L 120 80  L 160 120 L 300 120" fill="none" stroke="#3A78C9" stroke-width="0.8" opacity="0.16"/>
  <path d="M 60 540 L 360 540 L 400 500" fill="none" stroke="#FFD060" stroke-width="0.8" opacity="0.14"/>
  <path d="M 500 200 L 620 200 L 660 240 L 740 240" fill="none" stroke="#04aa6d" stroke-width="1" opacity="0.18"/>
  <path d="M 460 340 L 600 340 L 640 300 L 740 300" fill="none" stroke="#3A78C9" stroke-width="0.8" opacity="0.16"/>
  <path d="M 480 440 L 650 440 L 690 400 L 750 400" fill="none" stroke="#FFD060" stroke-width="0.8" opacity="0.14"/>

  <!-- Vertical traces -->
