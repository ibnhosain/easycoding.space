  <path d="M 360 180 L 360 340" fill="none" stroke="#04aa6d" stroke-width="1" opacity="0.16"/>
  <path d="M 500 280 L 500 480" fill="none" stroke="#3A78C9" stroke-width="0.8" opacity="0.16"/>
  <path d="M 300 120 L 300 260" fill="none" stroke="#3A78C9" stroke-width="0.8" opacity="0.14"/>
