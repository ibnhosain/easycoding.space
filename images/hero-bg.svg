<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 600" width="1400" height="600" role="img">
  <title>Programming concepts hero background</title>
  <desc>Dark navy background with HTML, CSS, JavaScript code snippets, circuit lines, and a code editor window representing web development concepts.</desc>

  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0A1520"/>
      <stop offset="45%"  stop-color="#1D2B3A"/>
      <stop offset="100%" stop-color="#0C1C2C"/>
    </linearGradient>

    <!-- Left fade for text readability -->
    <linearGradient id="left-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0A1520" stop-opacity="0.95"/>
      <stop offset="40%"  stop-color="#0A1520" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0A1520" stop-opacity="0"/>
    </linearGradient>

    <!-- Code window clip -->
    <clipPath id="win-clip">
      <rect x="760" y="60" width="600" height="490" rx="12"/>
    </clipPath>

    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.2" fill="#04aa6d" opacity="0.12"/>
    </pattern>

    <!-- Fine grid -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- === BACKGROUND === -->
  <rect width="1400" height="600" fill="url(#bg-grad)"/>
  <rect width="1400" height="600" fill="url(#grid)"/>
  <rect width="1400" height="600" fill="url(#dots)"/>

