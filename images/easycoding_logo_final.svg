<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 100">

  <!-- left bracket -->
  <text x="8" y="52" font-family="'Courier New', monospace" font-size="68" font-weight="900" fill="#E8621A" dominant-baseline="middle">&lt;</text>
  <!-- slash — centered between brackets -->
  <text x="60" y="52" font-family="'Courier New', monospace" font-size="42" font-weight="900" fill="#111111" text-anchor="middle" dominant-baseline="middle">/</text>
  <!-- right bracket -->
  <text x="78" y="52" font-family="'Courier New', monospace" font-size="68" font-weight="900" fill="#E8621A" dominant-baseline="middle">&gt;</text>

  <!-- easy -->
  <text x="122" y="30" font-family="'Courier New', monospace" font-size="28" font-weight="400" fill="#E8621A" dominant-baseline="middle">easy</text>
  <!-- coding.space -->
  <text x="122" y="60" font-family="'Courier New', monospace" font-size="28" font-weight="900" fill="#111111" dominant-baseline="middle">coding<tspan font-size="15" font-weight="500" fill="#E8621A">.space</tspan></text>

  <!-- tagline -->
  <text x="122" y="85" font-family="Arial, sans-serif" font-size="10.5" font-weight="700" fill="#444444" dominant-baseline="middle">বাংলায় কোডিং শেখার সেরা প্ল্যাটফর্ম</text>

</svg>
